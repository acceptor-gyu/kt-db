# DB Server Configuration - Common Settings
db.server.port=9000

# Default Authentication
default.user=user
default.password=9000

# Storage Configuration
db.storage.enabled=true

# Elasticsearch
spring.data.elasticsearch.repositories.enabled=true
elasticsearch.index.query-logs=db-query-logs

# Active Profile (default: local)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# VACUUM Configuration
vacuum.enabled=true
vacuum.threshold-ratio=0.3
vacuum.min-deleted-rows=100
vacuum.scan-interval-seconds=60
vacuum.max-retries=5
vacuum.retry-initial-delay-ms=1000
vacuum.retry-max-delay-ms=60000
vacuum.disk-space-check-enabled=true
vacuum.required-free-space-ratio=0.5
